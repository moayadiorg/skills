<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><!-- PROJECT_NAME --> — <!-- DECK_TITLE --></title>

  <link rel="stylesheet" href="reveal/dist/reveal.css">
  <link rel="stylesheet" href="reveal/plugin/highlight/monokai.css">
  <link rel="stylesheet" href="css/slides.css">
</head>
<body>
  <div class="reveal">
    <div class="slides">

      <!-- ========================================
           Slide 1: Title
           ======================================== -->
      <section>
        <p class="slide-label"><!-- CATEGORY_LABEL --></p>
        <h1><span class="accent"><!-- PROJECT_NAME --></span>: <!-- TITLE_LINE_1 --><br><!-- TITLE_LINE_2 --></h1>
        <p><!-- ONE_LINE_SUMMARY --></p>
        <aside class="notes">
          <!-- SPEAKER_NOTES: Introduction and context for the talk -->
        </aside>
      </section>

      <!-- ========================================
           Slide 2: The Problem
           ======================================== -->
      <section>
        <p class="slide-label">The Problem</p>
        <h2><!-- PROBLEM_HEADING --> <span class="danger"><!-- PROBLEM_KEYWORD --></span></h2>
        <ul>
          <li><strong><!-- PROBLEM_1 --></strong> &mdash; <!-- PROBLEM_1_DESC --></li>
          <li><strong><!-- PROBLEM_2 --></strong> &mdash; <!-- PROBLEM_2_DESC --></li>
          <li><strong><!-- PROBLEM_3 --></strong> &mdash; <!-- PROBLEM_3_DESC --></li>
          <li><strong><!-- PROBLEM_4 --></strong> &mdash; <!-- PROBLEM_4_DESC --></li>
        </ul>
        <aside class="notes">
          <!-- SPEAKER_NOTES -->
        </aside>
      </section>

      <!-- ========================================
           Slide 3: Overview / Architecture
           ======================================== -->
      <section>
        <p class="slide-label">What It Does</p>
        <h2><!-- OVERVIEW_HEADING --> <span class="accent"><!-- OVERVIEW_KEYWORD --></span></h2>
        <p style="max-width: 32em; margin: 0 auto;"><!-- OVERVIEW_DESC --></p>
        <div class="arch-flow">
          <div class="arch-box"><!-- ARCH_STEP_1 --></div>
          <div class="arch-arrow">&rarr;</div>
          <div class="arch-box arch-box--highlight"><!-- ARCH_STEP_2 --></div>
          <div class="arch-arrow">&rarr;</div>
          <div class="arch-box"><!-- ARCH_STEP_3 --></div>
        </div>
        <aside class="notes">
          <!-- SPEAKER_NOTES -->
        </aside>
      </section>

      <!-- ========================================
           Slide 4: Core Concept — Comparison
           ======================================== -->
      <section>
        <p class="slide-label">Core Concept</p>
        <h2><!-- COMPARISON_HEADING --></h2>
        <div class="compare">
          <div>
            <p class="compare-label compare-label--bad"><!-- BEFORE_LABEL --></p>
            <pre><code class="language-bash"><!-- BEFORE_CODE --></code></pre>
          </div>
          <div>
            <p class="compare-label compare-label--good"><!-- AFTER_LABEL --></p>
            <pre><code class="language-bash"><!-- AFTER_CODE --></code></pre>
          </div>
        </div>
        <aside class="notes">
          <!-- SPEAKER_NOTES -->
        </aside>
      </section>

      <!-- ========================================
           Slides 5-7: Workflow Steps
           Repeat this pattern for each key workflow step
           ======================================== -->
      <section>
        <p class="slide-label">Workflow</p>
        <h2><code><!-- COMMAND --></code> &mdash; <!-- COMMAND_DESC --></h2>
        <pre><code class="language-bash"><!-- COMMAND_OUTPUT --></code></pre>
        <aside class="notes">
          <!-- SPEAKER_NOTES -->
        </aside>
      </section>

      <!-- ========================================
           Slide 8: Feature Grid
           ======================================== -->
      <section>
        <p class="slide-label"><!-- FEATURES_LABEL --></p>
        <h2><!-- FEATURES_HEADING --></h2>
        <div class="feature-grid">
          <div class="feature-card">
            <h4><!-- FEATURE_1_TITLE --></h4>
            <p><!-- FEATURE_1_DESC --></p>
          </div>
          <div class="feature-card">
            <h4><!-- FEATURE_2_TITLE --></h4>
            <p><!-- FEATURE_2_DESC --></p>
          </div>
          <div class="feature-card">
            <h4><!-- FEATURE_3_TITLE --></h4>
            <p><!-- FEATURE_3_DESC --></p>
          </div>
          <div class="feature-card">
            <h4><!-- FEATURE_4_TITLE --></h4>
            <p><!-- FEATURE_4_DESC --></p>
          </div>
          <div class="feature-card">
            <h4><!-- FEATURE_5_TITLE --></h4>
            <p><!-- FEATURE_5_DESC --></p>
          </div>
          <div class="feature-card">
            <h4><!-- FEATURE_6_TITLE --></h4>
            <p><!-- FEATURE_6_DESC --></p>
          </div>
        </div>
        <aside class="notes">
          <!-- SPEAKER_NOTES -->
        </aside>
      </section>

      <!-- ========================================
           Slide 9: Key Differentiator / Callout
           ======================================== -->
      <section>
        <p class="slide-label"><!-- DIFFERENTIATOR_LABEL --></p>
        <h2>The <span class="danger"><!-- DIFFERENTIATOR_KEYWORD --></span> Problem</h2>
        <div class="callout-box">
          <p><!-- CALLOUT_TEXT --></p>
        </div>
        <div class="compare" style="margin-top: 1.5em;">
          <div>
            <p class="compare-label compare-label--bad"><!-- WITHOUT_LABEL --></p>
            <pre><code class="language-bash"><!-- WITHOUT_CODE --></code></pre>
          </div>
          <div>
            <p class="compare-label compare-label--good"><!-- WITH_LABEL --></p>
            <pre><code class="language-bash"><!-- WITH_CODE --></code></pre>
          </div>
        </div>
        <aside class="notes">
          <!-- SPEAKER_NOTES -->
        </aside>
      </section>

      <!-- ========================================
           Slide 10: Quick Start
           ======================================== -->
      <section>
        <p class="slide-label">Get Started</p>
        <h2><!-- QUICKSTART_HEADING --></h2>
        <pre><code class="language-bash"><!-- QUICKSTART_COMMANDS --></code></pre>
        <aside class="notes">
          <!-- SPEAKER_NOTES -->
        </aside>
      </section>

      <!-- ========================================
           Slide 11: Summary / Pillars
           ======================================== -->
      <section>
        <p class="slide-label">Why <!-- PROJECT_NAME --></p>
        <h2><!-- SUMMARY_HEADING --></h2>
        <div class="pillars">
          <div class="pillar">
            <div class="pillar-icon" style="color: var(--ibm-blue-60);"><!-- PILLAR_1_ICON --></div>
            <h3><!-- PILLAR_1_TITLE --></h3>
            <p class="muted"><!-- PILLAR_1_DESC --></p>
          </div>
          <div class="pillar">
            <div class="pillar-icon" style="color: var(--ibm-blue-60);"><!-- PILLAR_2_ICON --></div>
            <h3><!-- PILLAR_2_TITLE --></h3>
            <p class="muted"><!-- PILLAR_2_DESC --></p>
          </div>
          <div class="pillar">
            <div class="pillar-icon" style="color: var(--ibm-blue-60);"><!-- PILLAR_3_ICON --></div>
            <h3><!-- PILLAR_3_TITLE --></h3>
            <p class="muted"><!-- PILLAR_3_DESC --></p>
          </div>
        </div>
        <aside class="notes">
          <!-- SPEAKER_NOTES -->
        </aside>
      </section>

      <!-- ========================================
           Slide 12: Call to Action
           ======================================== -->
      <section>
        <h2><span class="accent">Get Started</span> Today</h2>
        <pre><code class="language-bash"><!-- INSTALL_COMMAND --></code></pre>
        <p style="margin-top: 1em;">
          <a href="<!-- GITHUB_URL -->" style="color: var(--ibm-blue-60); font-size: 0.8em;"><!-- GITHUB_DISPLAY_URL --></a>
        </p>
        <p class="muted" style="font-size: 0.6em; margin-top: 2em;">
          <!-- LICENSE --> &middot; <!-- TECH_STACK --> &middot; <!-- EXTRA_DETAIL -->
        </p>
        <aside class="notes">
          <!-- SPEAKER_NOTES -->
        </aside>
      </section>

    </div>
  </div>

  <script type="module">
    import Reveal from './reveal/dist/reveal.esm.js';
    import Highlight from './reveal/plugin/highlight/highlight.esm.js';

    Reveal.initialize({
      hash: true,
      slideNumber: true,
      controls: true,
      progress: true,
      center: true,
      transition: 'slide',
      plugins: [Highlight]
    });
  </script>
</body>
</html>
