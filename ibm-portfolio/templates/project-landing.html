<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="description" content="<!-- PROJECT_DESCRIPTION -->">

  <!-- Open Graph -->

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

<body>

  <!-- ============================================================
       SECTION 1: Hero (dark)
       Preset A: Dark hero with terminal demo + CTA buttons
       ============================================================ -->
  <section class="section section--dark hero">
    <div class="container">
      <p class="section-label"><!-- CATEGORY_LABEL --></p>
      <h1><!-- HERO_HEADING --></h1>
      <p class="hero-subtitle">
        <!-- HERO_SUBTITLE: 1-2 sentences describing what the project does -->
      </p>

      <!-- Terminal demo block -->
      <div class="terminal hero-terminal">
        <div class="terminal-bar">
          <span class="terminal-dot terminal-dot--red"></span>
          <span class="terminal-dot terminal-dot--yellow"></span>
          <span class="terminal-dot terminal-dot--green"></span>
        </div>
        <pre><code><!-- TERMINAL_DEMO: Show the primary command + output --></code></pre>
      </div>

      <!-- CTA buttons -->
      <div class="hero-actions">
        <a href="#quickstart" class="btn btn--primary">Get Started</a>
        <a href="slides.html" class="btn btn--ghost btn--ghost-dark">View Slides</a>
      </div>
    </div>
  </section>

  <!-- ============================================================
       SECTION 2: Problem Statement (light)
       Preset A: 3-column card grid with icons explaining the problem
       ============================================================ -->
  <section class="section section--light">
    <div class="container">
      <p class="section-label">The Problem</p>
      <h2 class="section-title"><!-- PROBLEM_HEADING --></h2>
      <div class="grid grid-3">
        <div class="card">
          <div class="card-icon"><!-- ICON_1: Use HTML entity --></div>
          <h3><!-- PROBLEM_1_TITLE --></h3>

          <p><!-- PROBLEM_3_DESC --></p>
        </div>

    </div>
  </section>
